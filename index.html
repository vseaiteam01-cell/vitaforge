<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>VITAFORGE</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">

<body>
  <!-- Онбординг (показывается при первом запуске) -->
  <div id="onboarding" class="onb"></div>

  <!-- Экраны -->
  <main id="screen-home"   class="screen active"></main>
  <main id="screen-gym"    class="screen"></main>
  <main id="screen-food"   class="screen"></main>
  <main id="screen-quests" class="screen"></main>
  <main id="screen-hero"   class="screen"></main>

  <!-- Плавающий таб-бар -->
  <nav class="tabbar" id="tabbar">
    <button class="tab active" data-tab="home"><span class="ic"><svg viewBox="0 0 24 24"><path d="M3 11.5 12 4l9 7.5"/><path d="M5.5 10v9.5h13V10"/></svg></span><span class="tl">Дом</span></button>
    <button class="tab" data-tab="gym"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 9v6M6.5 7.5v9M17.5 7.5v9M20 9v6M6.5 12h11"/></svg></span><span class="tl">Зал</span></button>
    <button class="tab" data-tab="food"><span class="ic"><svg viewBox="0 0 24 24"><path d="M4 11h16"/><path d="M5 11a7 7 0 0 0 14 0"/><path d="M9 3.5c-1 1.2-1 2.3 0 3.5M13 3.5c-1 1.2-1 2.3 0 3.5"/></svg></span><span class="tl">Еда</span></button>
    <button class="tab" data-tab="quests"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="8.2"/><circle cx="12" cy="12" r="4"/><circle cx="12" cy="12" r="0.6"/></svg></span><span class="tl">Квесты</span></button>
    <button class="tab" data-tab="hero"><span class="ic"><svg viewBox="0 0 24 24"><circle cx="12" cy="8" r="3.8"/><path d="M5 20.5a7 7 0 0 1 14 0"/></svg></span><span class="tl">Герой</span></button>
  </nav>

  <!-- Модалка -->
  <div class="modal-wrap" id="modalWrap"><div class="modal-bg" id="modalBg"></div><div class="modal" id="modal"></div></div>
  <div class="toast" id="toast"></div>
  <div class="rest-timer" id="restTimer"></div>
  <div class="fx" id="fx"></div>

  <script>window.__vfAvatarQueue=[];window.mountAvatar=function(c,o){if(window.VFAvatar){window.VFAvatar.mount(c,o);}else{window.__vfAvatarQueue.push([c,o]);}};</script>
  <script src="data.js?v=28"></script>
  <script src="recipes.js?v=28"></script>
